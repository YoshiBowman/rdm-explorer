name: Build & Release

on:
  push:
    tags:
      - 'v*'           # Triggers on any tag like v0.1.0, v1.2.3
  workflow_dispatch:   # Allows manual trigger from the GitHub Actions tab

jobs:
  # ── Build on all three platforms in parallel ────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon runner; builds both arm64 + x64 dmg
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      # ── macOS ────────────────────────────────────────────────────────────────
      # Signs + notarizes when the signing secrets are configured; otherwise
      # falls back to an unsigned build so the workflow always produces artifacts.
      #   Required secrets for signed builds:
      #     MAC_CERT_P12_BASE64          Developer ID Application cert (.p12) base64-encoded
      #     MAC_CERT_PASSWORD            password used when exporting that .p12
      #     APPLE_ID                     your Apple ID email
      #     APPLE_APP_SPECIFIC_PASSWORD  app-specific password from appleid.apple.com
      #     APPLE_TEAM_ID                10-character Apple Developer Team ID
      - name: Build (macOS)
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CSC_LINK" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "🔐 Signing + notarizing with Developer ID $APPLE_TEAM_ID"
            npx electron-builder --mac --x64 --arm64 --publish never \
              -c.mac.notarize.teamId="$APPLE_TEAM_ID"
          else
            echo "⚠ No signing secrets set — building UNSIGNED"
            # Clear the empty cert env vars so electron-builder doesn't try to
            # load an empty CSC_LINK path (which fails with "not a file").
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npx electron-builder --mac --x64 --arm64 --publish never
          fi

      - name: Build (Windows)
        if: matrix.platform == 'win'
        run: npm run build:win -- --publish never

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: npm run build:linux -- --publish never

      # ── Upload each platform's installers as workflow artifacts ───────────────
      - name: Upload artifact (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg
          if-no-files-found: error

      - name: Upload artifact (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist/*.exe
          if-no-files-found: error

      - name: Upload artifact (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*.AppImage
          if-no-files-found: error

  # ── Collect installers and attach them to a GitHub Release ──────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')   # only on a version tag
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten + checksum
        run: |
          mkdir -p out
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' \) -exec cp {} out/ \;
          cd out && shasum -a 256 * > SHA256SUMS.txt
          ls -la

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RDM Explorer ${{ github.ref_name }}
          body: |
            ## RDM Explorer ${{ github.ref_name }}

            Signed & notarized macOS builds, plus Windows and Linux installers.

            | File | Platform |
            |------|----------|
            | `*-arm64.dmg` | macOS — Apple Silicon |
            | `*.dmg` | macOS — Intel |
            | `*.exe` | Windows |
            | `*.AppImage` | Linux — x86_64 |
            | `SHA256SUMS.txt` | Checksums |

            _Edit these notes before publishing._
          files: out/*
          draft: true    # opens as a draft to review before publishing
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
