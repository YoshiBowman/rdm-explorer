name: Build & Release

on:
  push:
    tags:
      - 'v*'           # Triggers on any tag like v0.1.0, v1.2.3
  workflow_dispatch:   # Allows manual trigger from the GitHub Actions tab

# electron-builder publishes installers + the latest*.yml auto-update metadata to
# a draft GitHub Release for the tag. Needs write access to contents.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon runner; builds both arm64 + x64
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      # Publish mode: on a version tag, electron-builder uploads to the GitHub
      # release (installers + latest*.yml + blockmaps for auto-update). On a
      # manual workflow_dispatch (no tag) it just builds, so nothing is published.
      - name: Set publish flag
        id: pub
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "flag=always" >> "$GITHUB_OUTPUT"
          else
            echo "flag=never" >> "$GITHUB_OUTPUT"
          fi

      # ── macOS ────────────────────────────────────────────────────────────────
      # Signs + notarizes when the signing secrets are configured; otherwise
      # builds unsigned. Required secrets for signed builds:
      #   MAC_CERT_P12_BASE64  MAC_CERT_PASSWORD  APPLE_ID
      #   APPLE_APP_SPECIFIC_PASSWORD  APPLE_TEAM_ID
      - name: Build (macOS)
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$CSC_LINK" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "🔐 Signing + notarizing with Developer ID $APPLE_TEAM_ID"
            npx electron-builder --mac --x64 --arm64 --publish ${{ steps.pub.outputs.flag }} \
              -c.mac.notarize.teamId="$APPLE_TEAM_ID"
          else
            echo "⚠ No signing secrets set — building UNSIGNED"
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npx electron-builder --mac --x64 --arm64 --publish ${{ steps.pub.outputs.flag }}
          fi

      - name: Build (Windows)
        if: matrix.platform == 'win'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish ${{ steps.pub.outputs.flag }}

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --publish ${{ steps.pub.outputs.flag }}
